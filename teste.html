<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Transportes</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        #resultado { margin-top: 20px; padding: 15px; display: none; text-align: left; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Consulta de Transporte</h2>
        <p>Digite seu CPF para acessar o sistema:</p>
        
        <input type="text" id="cpfInput" placeholder="Somente números">
        <button id="btnConsultar" onclick="fazerLogin()">Consultar</button>

        <div id="resultado"></div>
    </div>

    <script>
        // ATENÇÃO: Substitua o link abaixo pela SUA URL DO WEB APP gerada no Google Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbwOmGvAcKgiIMEKZBrRD6zofIbTeMBdxiwW353J12ENW8Wf2hYAZ32UytOERnqorAs/exec"; 

        function fazerLogin() {
            // Pega o valor digitado e limpa qualquer ponto ou traço usando Regex
            const cpfDigitado = document.getElementById('cpfInput').value.replace(/\D/g, ''); 
            const divResultado = document.getElementById('resultado');
            const btn = document.getElementById('btnConsultar');

            if (cpfDigitado === "") {
                alert("Por favor, digite um CPF válido.");
                return;
            }

            // Efeito visual de carregamento na tela
            btn.innerText = "Buscando...";
            btn.disabled = true;
            divResultado.style.display = "block";
            divResultado.innerHTML = "<p style='text-align:center;'>Conectando à base de dados...</p>";

            // Faz a requisição para a sua API enviando o CPF
            fetch(`${API_URL}?cpf=${cpfDigitado}`)
                .then(response => response.json())
                .then(dados => {
                    // Libera o botão novamente
                    btn.innerText = "Consultar";
                    btn.disabled = false;

                    // Verifica se a API retornou a mensagem de erro que configuramos
                    if (dados.erro) {
                        divResultado.innerHTML = `<p style="color: red; text-align:center;"><b>Erro:</b> ${dados.erro}</p>`;
                    } else {
                        // Sucesso! 
                        // Como a API retorna a planilha inteira, vamos filtrar apenas o aluno que fez o login para mostrar na tela:
                        const alunoLogado = dados.find(aluno => {
                            let cpfPlanilha = (aluno.cpf || "").toString().replace(/\D/g, '');
                            return cpfPlanilha === cpfDigitado;
                        });
                        
                        // Monta o mini-dashboard do estudante
                        divResultado.innerHTML = `
                            <h3 style="color: green; text-align:center;">Acesso Liberado!</h3>
                            <p><strong>Nome:</strong> ${alunoLogado.nome}</p>
                            <p><strong>Dias:</strong> ${alunoLogado.dias}</p>
                            <p><strong>Embarque:</strong> ${alunoLogado.embarque}</p>
                            <p><strong>Seu Ônibus:</strong> ${alunoLogado.onibus}</p>
                        `;
                        
                        // Aqui os dados de TODOS os alunos já estão na variável "dados"
                        // Você pode salvá-los no localStorage se for usar em outras telas do portal
                        console.log("Todos os dados carregados:", dados);
                    }
                })
                .catch(erro => {
                    btn.innerText = "Consultar";
                    btn.disabled = false;
                    divResultado.innerHTML = `<p style="color: red; text-align:center;">Erro ao conectar com o servidor.</p>`;
                    console.error("Erro na requisição:", erro);
                });
        }
    </script>
</body>
</html>

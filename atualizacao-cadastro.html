<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualização Cadastral - Transporte Graça/CE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-yellow: #f1c40f;
            --dark: #2d3436;
            --muted: #636e72;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --border-radius: 12px;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            
            --success: #28a745;
            --info: #17a2b8;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif;
            background-image: url('fundo-login.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .cabecalho-oficial { padding: 20px; display: flex; justify-content: center; }
        .pill-logo { background: white; padding: 10px 25px; border-radius: 50px; box-shadow: var(--shadow); }
        .pill-logo img { height: 45px; }

        .main-container { display: flex; justify-content: center; align-items: flex-start; min-height: 80vh; padding: 20px; }

        .glass-card {
            background: var(--bg-glass); backdrop-filter: blur(10px); width: 100%;
            border-radius: var(--border-radius); box-shadow: var(--shadow); overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* MUDANÇA DA COR AQUI: Amarelo em vez de Preto no cabeçalho do login */
        .card-header-yellow { 
            background-color: var(--primary-yellow); 
            color: var(--dark); 
            padding: 30px; 
            text-align: center; 
        }

        .card-body { padding: 30px; }
        
        .cpf-input { 
            width: 100%; max-width: 320px; padding: 15px; margin: 20px auto; display: block; 
            border: 2px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; transition: 0.3s; 
        }
        .cpf-input:focus { outline: none; border-color: var(--dark); }
        
        .btn-primary {
            background-color: var(--dark); color: white; border: none; padding: 15px 35px;
            font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer;
            width: 100%; max-width: 320px; display: flex; justify-content: center; align-items: center; gap: 10px; margin: 0 auto; transition: 0.3s;
        }
        .btn-primary:hover { background-color: #000; transform: scale(1.02); }
        .btn-primary:disabled { background-color: #777; cursor: not-allowed; transform: none; }

        .input-filtro { 
            width: 100%; margin-top: 5px; padding: 12px; border-radius: 8px; 
            border: 1px solid #ddd; background: #fff; font-family: inherit; font-size: 14px;
        }

        .spinner { border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid var(--dark); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="cabecalho-oficial">
        <div class="pill-logo">
            <img src="Logo prefeitura.png" alt="LOGO Governo Municipal de Graça">
        </div>
    </header>

    <div class="main-container">
        
        <!-- PASSO 1: TELA DE LOGIN DO CPF (COM COR AMARELA NO TOPO) -->
        <section id="login-wrapper" class="glass-card" style="max-width: 450px;">
            <div class="card-header-yellow">
                <h2 style="font-size: 24px;">📝 Atualização Cadastral</h2>
                <p style="opacity: 0.85; font-size: 14px; margin-top: 5px; font-weight: 600;">Exclusivo para veteranos</p>
            </div>
            <div class="card-body" style="text-align: center;">
                <p style="color: var(--muted);">Informe seu CPF para iniciar a atualização dos seus dados.</p>
                <input type="text" id="cpf-input" class="cpf-input" placeholder="000.000.000-00" maxlength="14">
                
                <button onclick="tentarAcesso()" id="btn-entrar" class="btn-primary">
                    <div id="spinner" class="spinner"></div>
                    <span>Consultar Cadastro</span>
                </button>
                
                <div id="feedback-login" style="margin-top:15px; font-size: 14px; font-weight: 600;"></div>
                <div style="margin-top: 25px;">
                    <a href="index.html" style="color: var(--muted); font-size: 14px; text-decoration: none;">← Voltar ao Início</a>
                </div>
            </div>
        </section>

        <!-- PASSO 2: FORMULÁRIO DE ATUALIZAÇÃO -->
        <section id="form-wrapper" class="glass-card" style="display: none; max-width: 600px; margin: 0 auto;">
            <div class="card-header-yellow">
                <h2 style="font-size: 24px;">✅ Cadastro Encontrado</h2>
                <p style="opacity: 0.85; font-size: 14px; margin-top: 5px;">Bem-vindo de volta </p>
            </div>
            
            <div class="card-body" style="text-align: left;">
                <p style="color: var(--muted); margin-bottom: 25px; text-align: center; font-size: 14px;">Atualize as informações abaixo para o novo semestre letivo.</p>
                
                <form id="form-atualizacao" onsubmit="enviarAtualizacao(event)">
                    
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: 600; font-size: 14px; color: var(--dark);">🏫 Instituição de Ensino</label>
                        <select id="update-instituicao" required class="input-filtro">
                            <option value="">Selecione sua instituição...</option>
                            <option value="ANHANGUERA">Anhanguera</option>
                            <option value="FLF">FLF</option>
                            <option value="IFCE">IFCE</option>
                            <option value="UNINTA">UNINTA</option>
                            <option value="UVA">UVA</option>
                            <option value="LUCIANO FEIJÃO">Luciano Feijão</option>
                            <option value="FARIAS BRITO">Farias Brito</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: 600; font-size: 14px; color: var(--dark);">📍 Ponto de Embarque</label>
                        <select id="update-embarque" required class="input-filtro">
                            <option value="">Selecione o ponto...</option>
                            <option value="SEDE">Sede</option>
                            <option value="BARRO VERMELHO">Barro Vermelho</option>
                            <option value="LAPA">Lapa</option>
                            <option value="VILA">Vila</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: 600; font-size: 14px; color: var(--dark);">🕒 Turno</label>
                        <select id="update-turno" required class="input-filtro">
                            <option value="">Selecione o turno...</option>
                            <option value="MANHÃ">Manhã</option>
                            <option value="NOITE">Noite</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: 600; font-size: 14px; color: var(--dark);">📅 Dias da semana (Marque os dias que irá viajar)</label>
                        <div style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
                            <label style="cursor: pointer;"><input type="checkbox" name="dias" value="Segunda"> Seg</label>
                            <label style="cursor: pointer;"><input type="checkbox" name="dias" value="Terça"> Ter</label>
                            <label style="cursor: pointer;"><input type="checkbox" name="dias" value="Quarta"> Qua</label>
                            <label style="cursor: pointer;"><input type="checkbox" name="dias" value="Quinta"> Qui</label>
                            <label style="cursor: pointer;"><input type="checkbox" name="dias" value="Sexta"> Sex</label>
                        </div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <label style="font-weight: 600; font-size: 14px; color: var(--dark);">📄 Comprovante de Matrícula (PDF)</label>
                        <input type="file" id="update-pdf" accept=".pdf" required style="width: 100%; margin-top: 5px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa;">
                        <p style="font-size: 12px; color: var(--muted); margin-top: 5px;">Anexe o arquivo em formato PDF atualizado.</p>
                    </div>

                    <button type="submit" id="btn-enviar-update" class="btn-primary" style="background-color: var(--success); width: 100%; max-width: 100%;">
                        <div id="spinner-update" class="spinner" style="border-top-color: white;"></div>
                        <span id="texto-btn-update">🚀 Enviar Atualização Cadastral</span>
                    </button>
                    
                    <button type="button" onclick="window.location.reload()" class="btn-primary" style="background-color: var(--danger); width: 100%; max-width: 100%; margin-top: 10px;">
                        <span>❌ Cancelar e Sair</span>
                    </button>
                </form>
            </div>
        </section>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx-Q8FqTPmStWEWhZlBMPBYaXCyPJYkRCvVCsg9oAIGaFP9cgm2Mby4VuoS38RGv9k/exec"; 
        
        let dadosNuvem = [];

        // Máscara de CPF
        document.getElementById('cpf-input').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 3) value = value.replace(/^(\d{3})(\d)/, '$1.$2');
            if (value.length > 6) value = value.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
            if (value.length > 9) value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
            e.target.value = value;
        });

        document.getElementById("cpf-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") tentarAcesso();
        });

        async function tentarAcesso() {
            const cpf = document.getElementById('cpf-input').value.trim().replace(/\D/g, '');
            const feedback = document.getElementById('feedback-login');
            const btn = document.getElementById('btn-entrar');
            const spinner = document.getElementById('spinner');
            const btnText = btn.querySelector('span');

            if (cpf.length !== 11) {
                feedback.innerText = "❌ Informe um CPF válido."; feedback.style.color = "var(--danger)";
                return;
            }

            btn.disabled = true; 
            spinner.style.display = "block";
            btnText.innerText = "Buscando...";
            feedback.innerText = "Verificando se você está na base...";
            feedback.style.color = "var(--dark)";

            try {
                const response = await fetch(`${API_URL}?acao=dashboard&cpf=${cpf}`);
                const data = await response.json();

                if (data.erro) {
                    feedback.innerText = "❌ CPF não encontrado. Procure a Secretaria."; 
                    feedback.style.color = "var(--danger)";
                } else if (data.sucesso) {
                    feedback.innerText = "✅ Cadastro localizado!";
                    feedback.style.color = "#155724";
                    
                    // Mapeia para pegar o nome
                    dadosNuvem = data.dadosGerais.map(aluno => {
                        let obj = { nome: "" };
                        for(let k in aluno) {
                            let keyNorm = k.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").trim();
                            if (keyNorm.includes("nome")) obj.nome = String(aluno[k]).trim();
                        }
                        return obj;
                    });
                    
                    setTimeout(() => {
                        document.getElementById('login-wrapper').style.display = 'none';
                        document.getElementById('form-wrapper').style.display = 'block';
                        
                        // Atualiza o nome do aluno no título
                        if(dadosNuvem.length > 0 && dadosNuvem[0].nome) {
                            document.getElementById('nome-aluno-span').innerText = dadosNuvem[0].nome.toUpperCase();
                        }
                    }, 800);
                }
            } catch (e) { 
                feedback.innerText = "❌ Erro de conexão com o servidor."; feedback.style.color = "var(--danger)";
            } finally {
                btn.disabled = false; 
                spinner.style.display = "none";
                btnText.innerText = "Consultar Cadastro";
            }
        }

        async function enviarAtualizacao(event) {
            event.preventDefault();
            
            const btn = document.getElementById('btn-enviar-update');
            const spinner = document.getElementById('spinner-update');
            const btnText = document.getElementById('texto-btn-update');
            
            btn.disabled = true;
            spinner.style.display = "block";
            btnText.innerText = "Enviando dados...";
            
            // A lógica de envio para o Google Sheets entrará aqui na próxima etapa!
            console.log("Formulário pronto para integração de envio.");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualização Cadastral - Transporte Graça/CE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-yellow: #f1c40f;
            --dark: #2d3436;
            --muted: #636e72;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --border-radius: 12px;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            
            --success: #28a745;
            --info: #17a2b8;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif;
            background-image: url('fundo-login.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .cabecalho-oficial { padding: 20px; display: flex; justify-content: center; }
        .pill-logo { background: white; padding: 10px 25px; border-radius: 50px; box-shadow: var(--shadow); }
        .pill-logo img { height: 45px; }

        .main-container { display: flex; justify-content: center; align-items: flex-start; min-height: 80vh; padding: 20px; }

        .glass-card {
            background: var(--bg-glass); backdrop-filter: blur(10px); width: 100%;
            border-radius: var(--border-radius); box-shadow: var(--shadow); overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { background-color: var(--dark); color: white; padding: 30px; text-align: center; }
        .card-body { padding: 30px; }
        .cpf-input { width: 100%; max-width: 320px; padding: 15px; margin: 20px auto; display: block; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; transition: 0.3s; }
        .cpf-input:focus { outline: none; border-color: var(--dark); }
        
        .btn-primary {
            background-color: var(--dark); color: white; border: none; padding: 15px 35px;
            font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer;
            width: 100%; max-width: 320px; display: flex; justify-content: center; align-items: center; gap: 10px; margin: 0 auto; transition: 0.3s;
        }
        .btn-primary:hover { background-color: #000; transform: scale(1.02); }
        .btn-primary:disabled { background-color: #777; cursor: not-allowed; transform: none; }

        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="cabecalho-oficial">
        <div class="pill-logo">
            <img src="Logo prefeitura.png" alt="LOGO Governo Municipal de Graça">
        </div>
    </header>

    <div class="main-container">
        
        <!-- PASSO 1: TELA DE LOGIN DO CPF -->
        <section id="login-wrapper" class="glass-card" style="max-width: 450px;">
            <div class="card-header">
                <h2 style="font-size: 24px;">📝 Atualização Cadastral</h2>
                <p style="opacity: 0.9; font-size: 14px; margin-top: 5px;">Exclusivo para veteranos</p>
            </div>
            <div class="card-body" style="text-align: center;">
                <p style="color: var(--muted);">Informe seu CPF para iniciar a atualização dos seus dados.</p>
                <input type="text" id="cpf-input" class="cpf-input" placeholder="000.000.000-00" maxlength="14">
                
                <button onclick="tentarAcesso()" id="btn-entrar" class="btn-primary">
                    <div id="spinner" class="spinner"></div>
                    <span>Consultar Cadastro</span>
                </button>
                
                <div id="feedback-login" style="margin-top:15px; font-size: 14px; font-weight: 600;"></div>
                <div style="margin-top: 25px;">
                    <a href="index.html" style="color: var(--muted); font-size: 14px; text-decoration: none;">← Voltar ao Início</a>
                </div>
            </div>
        </section>

        <!-- PASSO 2: FORMULÁRIO (OCULTO INICIALMENTE) -->
        <section id="form-wrapper" class="glass-card" style="display: none; max-width: 800px;">
            <div class="card-header" style="background-color: var(--primary-yellow); color: var(--dark);">
                <h2 style="font-size: 24px;">✅ Cadastro Encontrado</h2>
                <p style="opacity: 0.9; font-size: 14px; margin-top: 5px;">Bem-vindo de volta, <strong id="nome-aluno-span">Aluno</strong></p>
            </div>
            <div class="card-body">
                <p>Aqui entrará o formulário para você atualizar seus dados (Instituição, Turno, PDF, etc).</p>
                <br>
                <button onclick="window.location.reload()" class="btn-primary" style="background-color: var(--danger);">Sair</button>
            </div>
        </section>

    </div>

    <script>
        // Mesma API que usamos no Painel de Consulta
        const API_URL = "https://script.google.com/macros/s/AKfycbx-Q8FqTPmStWEWhZlBMPBYaXCyPJYkRCvVCsg9oAIGaFP9cgm2Mby4VuoS38RGv9k/exec"; 
        
        let dadosAlunoAtual = {};

        // Máscara de CPF
        document.getElementById('cpf-input').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 3) value = value.replace(/^(\d{3})(\d)/, '$1.$2');
            if (value.length > 6) value = value.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
            if (value.length > 9) value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
            e.target.value = value;
        });

        document.getElementById("cpf-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") tentarAcesso();
        });

        async function tentarAcesso() {
            const cpf = document.getElementById('cpf-input').value.trim().replace(/\D/g, '');
            const feedback = document.getElementById('feedback-login');
            const btn = document.getElementById('btn-entrar');
            const spinner = document.getElementById('spinner');
            const btnText = btn.querySelector('span');

            if (cpf.length !== 11) {
                feedback.innerText = "❌ Informe um CPF válido."; feedback.style.color = "var(--danger)";
                return;
            }

            btn.disabled = true; 
            spinner.style.display = "block";
            btnText.innerText = "Buscando...";
            feedback.innerText = "Verificando se você está na base...";
            feedback.style.color = "var(--info)";

            try {
                const response = await fetch(`${API_URL}?acao=dashboard&cpf=${cpf}`);
                const data = await response.json();

                if (data.erro) {
                    feedback.innerText = "❌ CPF não encontrado. Procure a Secretaria."; 
                    feedback.style.color = "var(--danger)";
                } else if (data.sucesso) {
                    feedback.innerText = "✅ Cadastro localizado!";
                    feedback.style.color = "var(--success)";
                    
                    // Como é um aluno só acessando o PRÓPRIO cpf, ele retorna a matriz toda, 
                    // mas o aluno dele é o primeiro da lista filtrada.
                    
                    // Pegando os dados brutões para preencher o form depois
                    // (Isso será muito útil para auto-preencher os campos na próxima etapa)
                    console.log("Dados recebidos da API:", data.dadosGerais);
                    
                    // Esconde o Login e mostra a tela do formulário
                    setTimeout(() => {
                        document.getElementById('login-wrapper').style.display = 'none';
                        document.getElementById('form-wrapper').style.display = 'block';
                        
                        // Uma brincadeira pra mostrar o nome do aluno no cabeçalho amarelo
                        // Se a API retornar o nome do usuário que logou, podemos colocar aqui!
                        // document.getElementById('nome-aluno-span').innerText = "...";
                    }, 1000);
                }
            } catch (e) { 
                feedback.innerText = "❌ Erro de conexão com o servidor."; feedback.style.color = "var(--danger)";
            } finally {
                btn.disabled = false; 
                spinner.style.display = "none";
                btnText.innerText = "Consultar Cadastro";
            }
        }
    </script>
</body>
</html>

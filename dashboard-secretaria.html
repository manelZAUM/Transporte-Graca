
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Secretaria - Gestão</title>
    
    <!-- Puxa o seu estilo global -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Estilos específicos para a tabela e modal (Painel de Controlo) -->
    <style>
        /* Ajustes para o Cartão Principal do Painel */
        .painel-card {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* Tabela */
        .tabela-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.95rem;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f1f8ff;
        }
        
        /* Status Tags */
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }
        .status-aprovado { background-color: #d4edda; color: #155724; }
        .status-pendente { background-color: #fff3cd; color: #856404; }
        .status-reprovado { background-color: #f8d7da; color: #721c24; }

        /* Botões de Ação na Tabela */
        .btn-acao {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-right: 5px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .btn-editar { background-color: #f8f9fa; color: #333; border: 1px solid #ddd; }
        .btn-editar:hover { background-color: #e2e6ea; border-color: #dae0e5; }
        .btn-excluir { background-color: #fff; color: #dc3545; border: 1px solid #dc3545; }
        .btn-excluir:hover { background-color: #dc3545; color: #fff; }
        
        .btn-adicionar { 
            background-color: #28a745; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2);
        }
        .btn-adicionar:hover { background-color: #218838; transform: translateY(-1px); }

        .btn-sair-painel {
            background-color: #dc3545;
            color: white;
            border: none;
        }
        .btn-sair-painel:hover {
            background-color: #c82333;
        }

        #mensagem-carregamento {
            text-align: center;
            font-size: 1.2rem;
            color: #0056b3;
            padding: 50px 20px;
            font-weight: bold;
        }

        /* Estilos do Modal (Janela flutuante) */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); 
            backdrop-filter: blur(3px);
        }
        .modal-content { 
            background-color: white; margin: 5% auto; padding: 30px; 
            border-radius: 12px; width: 90%; max-width: 500px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 0.9rem;}
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; 
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #0056b3; outline: none;
        }
        .modal-acoes { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; }
        .btn-salvar { background-color: #0056b3; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1;}
        .btn-salvar:hover { background-color: #004494; }
        .btn-cancelar { background-color: #f8f9fa; color: #333; border: 1px solid #ddd; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1;}
        .btn-cancelar:hover { background-color: #e2e6ea; }
        
        .cabecalho-tabela-titulo {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }
        .cabecalho-tabela-titulo h3 { margin: 0; color: #333; font-size: 1.5rem; }
        .cabecalho-tabela-titulo p { margin: 5px 0 0 0; color: #666; }
    </style>
</head>
<body>

    <!-- CABEÇALHO OFICIAL (Baseado no index.html) -->
    <header class="cabecalho-oficial">
        <div class="pill-logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="Logo prefeitura.png" alt="Logo Prefeitura de Graça" onerror="this.style.display='none'">
            <span style="color: white; font-weight: bold; font-size: 1.2rem;">Gestão de Transporte</span>
        </div>
        <button onclick="fazerLogout()" class="botaosec btn btn-sair-painel">Sair do Painel</button>
    </header>

    <!-- ÁREA PRINCIPAL -->
    <main class="area-portal">
        <!-- O Card engloba o conteúdo para ficar com o fundo branco e bordas arredondadas -->
        <div class="card painel-card">
            
            <div id="mensagem-carregamento">
                <span style="font-size: 2rem; display: block; margin-bottom: 10px;">⏳</span>
                A carregar a base de dados... Por favor, aguarde.
            </div>

            <div id="conteudo-painel" style="display: none;">
                
                <div class="cabecalho-tabela-titulo">
                    <div>
                        <h3>Lista Geral de Estudantes</h3>
                        <p>Faça a gestão completa dos alunos cadastrados no sistema.</p>
                    </div>
                    <button class="btn-adicionar" onclick="abrirModal()">+ Adicionar Novo Aluno</button>
                </div>
                
                <div class="tabela-container">
                    <table id="tabela-alunos">
                        <thead>
                            <tr>
                                <th>Nome do Aluno</th>
                                <th>CPF</th>
                                <th>Instituição</th>
                                <th>Turno</th>
                                <th>Rota</th>
                                <th>Status</th>
                                <th style="text-align: center;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela">
                            <!-- Os dados serão injetados aqui via JavaScript -->
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>

    <!-- MODAL DE CADASTRO / EDIÇÃO -->
    <div id="modal-aluno" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; color: #0056b3; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 20px;">Adicionar Novo Aluno</h3>
            <form id="form-aluno" onsubmit="salvarAluno(event)">
                <input type="hidden" id="aluno-id"> 
                
                <div class="form-group">
                    <label>Nome Completo:</label>
                    <input type="text" id="aluno-nome" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>CPF:</label>
                    <input type="text" id="aluno-cpf" required placeholder="Apenas números ou com pontuação" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Instituição:</label>
                    <input type="text" id="aluno-instituicao" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Turno:</label>
                    <select id="aluno-turno" required>
                        <option value="">Selecione...</option>
                        <option value="Manhã">Manhã</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                        <option value="Integral">Integral</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ônibus/Rota:</label>
                    <select id="aluno-onibus" required>
                        <option value="">Selecione...</option>
                        <option value="AMARELO">AMARELO</option>
                        <option value="AZUL">AZUL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status / Prioridade:</label>
                    <select id="aluno-status" required>
                        <option value="Pendente">Pendente</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Prioridade">Prioridade (Fura Fila)</option>
                        <option value="Reprovado">Reprovado</option>
                    </select>
                </div>
                
                <div class="modal-acoes">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Guardar Dados</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS DE FUNCIONAMENTO -->
    <script>
        // 1. URL do seu Google Apps Script
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyLQYmr628VW5a31NMMjeXYmylth9uwqV-DVYLxs8cH4cF_lTv1F3zoEw9rmC7Z6KY/exec";

        // 2. Verificar se o administrador tem permissão (Token)
        const tokenAdmin = sessionStorage.getItem("admin_token");

        if (!tokenAdmin) {
            alert("Acesso restrito. Por favor, faça login primeiro.");
            window.location.href = "admin.html";
        } else {
            carregarDadosDaPlanilha();
        }

        // 3. Função para buscar os dados
        function carregarDadosDaPlanilha() {
            fetch(`${URL_APPS_SCRIPT}?acao=painel_admin&token=${tokenAdmin}`)
                .then(resposta => resposta.json())
                .then(dados => {
                    document.getElementById('mensagem-carregamento').style.display = 'none';

                    if (dados.sucesso) {
                        document.getElementById('conteudo-painel').style.display = 'block';
                        renderizarTabela(dados.dadosGerais);
                    } else {
                        alert("Erro de permissão: " + dados.erro);
                        fazerLogout();
                    }
                })
                .catch(erro => {
                    console.error(erro);
                    document.getElementById('mensagem-carregamento').innerHTML = "⚠️<br>Erro ao conectar com o servidor.<br>Verifique a sua internet.";
                    document.getElementById('mensagem-carregamento').style.color = "#dc3545";
                });
        }

        // 4. Função para desenhar a tabela na tela
        function renderizarTabela(alunos) {
            const corpoTabela = document.getElementById('corpo-tabela');
            corpoTabela.innerHTML = ""; 

            window.listaAlunosGlobais = alunos;

            alunos.forEach((aluno, index) => {
                const tr = document.createElement('tr');
                
                // Formatação de cor para o Status usando Badges
                let classeStatus = "";
                const statusTexto = (aluno.status || "").toLowerCase();
                if (statusTexto.includes("aprovado") || statusTexto.includes("prioridade")) classeStatus = "status-aprovado";
                else if (statusTexto.includes("pendente")) classeStatus = "status-pendente";
                else classeStatus = "status-reprovado";

                tr.innerHTML = `
                    <td style="font-weight: 500;">${aluno.nome || "-"}</td>
                    <td style="color: #666;">${aluno.cpf || "-"}</td>
                    <td>${aluno.instituicao || "-"}</td>
                    <td>${aluno.turno || "-"}</td>
                    <td><strong>${aluno.onibus || "-"}</strong></td>
                    <td><span class="status-badge ${classeStatus}">${aluno.status || "Pendente"}</span></td>
                    <td style="text-align: center; white-space: nowrap;">
                        <button class="btn-acao btn-editar" onclick="abrirModal(${index})">✏️ Editar</button>
                        <button class="btn-acao btn-excluir" onclick="excluirAluno('${aluno.cpf}')">🗑️</button>
                    </td>
                `;
                
                corpoTabela.appendChild(tr);
            });
        }

        // --- FUNÇÕES DO PAINEL DE CONTROLO (CRUD) ---

        function abrirModal(index = -1) {
            const modal = document.getElementById('modal-aluno');
            const titulo = document.getElementById('modal-titulo');
            const form = document.getElementById('form-aluno');
            
            form.reset(); 
            
            if (index >= 0) {
                // Modo Edição
                titulo.innerText = "✏️ Editar Aluno";
                const aluno = window.listaAlunosGlobais[index];
                
                document.getElementById('aluno-id').value = aluno.cpf; 
                document.getElementById('aluno-nome').value = aluno.nome || "";
                document.getElementById('aluno-cpf').value = aluno.cpf || "";
                document.getElementById('aluno-instituicao').value = aluno.instituicao || "";
                document.getElementById('aluno-turno').value = aluno.turno || "";
                document.getElementById('aluno-onibus').value = aluno.onibus || "";
                document.getElementById('aluno-status').value = aluno.status || "Pendente";
            } else {
                // Modo Adicionar
                titulo.innerText = "📝 Adicionar Novo Aluno";
                document.getElementById('aluno-id').value = "";
            }
            
            modal.style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('modal-aluno').style.display = 'none';
        }

        function salvarAluno(event) {
            event.preventDefault(); 
            
            const cpfAntigo = document.getElementById('aluno-id').value;
            const acaoBotao = cpfAntigo ? "editar_aluno" : "adicionar_aluno";
            
            const dadosAluno = {
                acao: acaoBotao,
                token: tokenAdmin,
                cpfAntigo: cpfAntigo, 
                nome: document.getElementById('aluno-nome').value,
                cpf: document.getElementById('aluno-cpf').value,
                instituicao: document.getElementById('aluno-instituicao').value,
                turno: document.getElementById('aluno-turno').value,
                onibus: document.getElementById('aluno-onibus').value,
                status: document.getElementById('aluno-status').value
            };

            const btnSalvar = document.querySelector('.btn-salvar');
            const textoOriginal = btnSalvar.innerText;
            btnSalvar.innerText = "A guardar...";
            btnSalvar.disabled = true;

            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                body: JSON.stringify(dadosAluno),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            })
            .then(resposta => resposta.json())
            .then(dados => {
                if (dados.sucesso) {
                    fecharModal();
                    document.getElementById('conteudo-painel').style.display = 'none';
                    document.getElementById('mensagem-carregamento').innerHTML = "<span style='font-size: 2rem; display: block; margin-bottom: 10px;'>🔄</span>A atualizar tabela...";
                    document.getElementById('mensagem-carregamento').style.display = 'block';
                    carregarDadosDaPlanilha(); 
                } else {
                    alert("❌ Erro ao guardar: " + dados.erro);
                }
            })
            .catch(erro => {
                fecharModal();
                setTimeout(carregarDadosDaPlanilha, 2000); 
            })
            .finally(() => {
                btnSalvar.innerText = textoOriginal;
                btnSalvar.disabled = false;
            });
        }

        function excluirAluno(cpf) {
            if (confirm("⚠️ Tem a certeza que deseja EXCLUIR este aluno da base de dados? Esta ação não pode ser desfeita.")) {
                
                document.getElementById('mensagem-carregamento').innerHTML = "<span style='font-size: 2rem; display: block; margin-bottom: 10px;'>🗑️</span>A excluir aluno...";
                document.getElementById('mensagem-carregamento').style.display = 'block';
                document.getElementById('conteudo-painel').style.display = 'none';

                fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ acao: "excluir_aluno", token: tokenAdmin, cpf: cpf }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                })
                .then(resposta => resposta.json())
                .then(dados => {
                    if (dados.sucesso) {
                        carregarDadosDaPlanilha();
                    } else {
                        alert("❌ Erro: " + dados.erro);
                        carregarDadosDaPlanilha();
                    }
                })
                .catch(erro => {
                    setTimeout(carregarDadosDaPlanilha, 2000);
                });
            }
        }

        // 5. Função de Logout
        function fazerLogout() {
            sessionStorage.removeItem("admin_token"); 
            window.location.href = "admin.html"; 
        }
    </script>
</body>
</html>

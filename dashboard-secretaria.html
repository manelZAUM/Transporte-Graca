<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Secretaria - Gestão</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Estilos específicos para a tabela do painel -->
    <style>
        .tabela-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #0056b3;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .status-aprovado { color: #28a745; font-weight: bold; }
        .status-pendente { color: #ffc107; font-weight: bold; }
        .status-reprovado { color: #dc3545; font-weight: bold; }
        
        .cabecalho-painel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-sair {
            background-color: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-sair:hover {
            background-color: #c82333;
        }

        #mensagem-carregamento {
            text-align: center;
            font-size: 1.2rem;
            color: #0056b3;
            padding: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="cabecalho-oficial" style="padding: 15px 5%;">
        <div class="cabecalho-painel" style="width: 100%;">
            <h2 style="color: white; margin: 0;">Gestão do Transporte</h2>
            <button onclick="fazerLogout()" class="btn-sair">Sair do Painel</button>
        </div>
    </header>

    <main class="area-portal" style="max-width: 1200px; margin: 20px auto; padding: 0 15px;">
        
        <div id="mensagem-carregamento">
            ⏳ Carregando banco de dados... Por favor, aguarde.
        </div>

        <div id="conteudo-painel" style="display: none;">
            <h3>Lista Geral de Estudantes</h3>
            <p>Abaixo estão listados todos os alunos cadastrados no sistema.</p>
            
            <div class="tabela-container">
                <table id="tabela-alunos">
                    <thead>
                        <tr>
                            <th>Nome do Aluno</th>
                            <th>Instituição</th>
                            <th>Turno</th>
                            <th>Rota/Ônibus</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        <!-- Os dados serão injetados aqui via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // 1. URL do seu Google Apps Script
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyLQYmr628VW5a31NMMjeXYmylth9uwqV-DVYLxs8cH4cF_lTv1F3zoEw9rmC7Z6KY/exec";

        // 2. Verificar se o administrador tem permissão (Token)
        const tokenAdmin = sessionStorage.getItem("admin_token");

        if (!tokenAdmin) {
            // Se não tem token, joga de volta para a tela de login
            alert("Acesso restrito. Por favor, faça login primeiro.");
            window.location.href = "admin.html";
        } else {
            // Se tem token, busca os dados no servidor
            carregarDadosDaPlanilha();
        }

        // 3. Função para buscar os dados
        function carregarDadosDaPlanilha() {
            // Envia a ação 'painel_admin' e a chave de segurança 'token'
            fetch(`${URL_APPS_SCRIPT}?acao=painel_admin&token=${tokenAdmin}`)
                .then(resposta => resposta.json())
                .then(dados => {
                    document.getElementById('mensagem-carregamento').style.display = 'none';

                    if (dados.sucesso) {
                        // Exibe a tabela e popula com os dados
                        document.getElementById('conteudo-painel').style.display = 'block';
                        renderizarTabela(dados.dadosGerais);
                    } else {
                        // Se o token for inválido ou o e-mail não tiver mais permissão
                        alert("Erro de permissão: " + dados.erro);
                        fazerLogout();
                    }
                })
                .catch(erro => {
                    console.error(erro);
                    document.getElementById('mensagem-carregamento').innerText = "Erro ao conectar com o servidor. Verifique sua internet.";
                    document.getElementById('mensagem-carregamento').style.color = "red";
                });
        }

        // 4. Função para desenhar a tabela na tela
        function renderizarTabela(alunos) {
            const corpoTabela = document.getElementById('corpo-tabela');
            corpoTabela.innerHTML = ""; // Limpa a tabela

            alunos.forEach(aluno => {
                const tr = document.createElement('tr');
                
                // Formatação de cor para o Status
                let classeStatus = "";
                const statusTexto = (aluno.status || "").toLowerCase();
                if (statusTexto.includes("aprovado")) classeStatus = "status-aprovado";
                else if (statusTexto.includes("pendente")) classeStatus = "status-pendente";
                else classeStatus = "status-reprovado";

                tr.innerHTML = `
                    <td>${aluno.nome || "-"}</td>
                    <td>${aluno.instituicao || "-"}</td>
                    <td>${aluno.turno || "-"}</td>
                    <td>${aluno.onibus || "-"}</td>
                    <td class="${classeStatus}">${aluno.status || "-"}</td>
                `;
                
                corpoTabela.appendChild(tr);
            });
        }

        // 5. Função de Logout
        function fazerLogout() {
            sessionStorage.removeItem("admin_token"); // Apaga a chave do navegador
            window.location.href = "admin.html"; // Volta para o login
        }
    </script>
</body>
</html>

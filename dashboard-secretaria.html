<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Secretaria - Gestão</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Estilos específicos para a tabela e painel de controlo -->
    <style>
        .tabela-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.95rem;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #0056b3;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .status-aprovado { color: #28a745; font-weight: bold; }
        .status-pendente { color: #ffc107; font-weight: bold; }
        .status-reprovado { color: #dc3545; font-weight: bold; }
        
        .cabecalho-painel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-sair {
            background-color: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-sair:hover { background-color: #c82333; }

        #mensagem-carregamento {
            text-align: center;
            font-size: 1.2rem;
            color: #0056b3;
            padding: 40px;
            font-weight: bold;
        }

        /* --- NOVOS ESTILOS DO PAINEL DE CONTROLO (BOTÕES E MODAL) --- */
        .btn-acao {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 5px;
            color: white;
            transition: 0.2s;
        }
        .btn-editar { background-color: #ffc107; color: #000; }
        .btn-editar:hover { background-color: #e0a800; }
        .btn-excluir { background-color: #dc3545; }
        .btn-excluir:hover { background-color: #c82333; }
        .btn-adicionar { 
            background-color: #28a745; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .btn-adicionar:hover { background-color: #218838; }
        
        /* Estilos do Modal (Janela flutuante) */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); 
        }
        .modal-content { 
            background-color: white; margin: 5% auto; padding: 25px; 
            border-radius: 8px; width: 90%; max-width: 500px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333;}
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; 
        }
        .modal-acoes { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-salvar { background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-cancelar { background-color: #6c757d; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <header class="cabecalho-oficial" style="padding: 15px 5%;">
        <div class="cabecalho-painel" style="width: 100%;">
            <h2 style="color: white; margin: 0;">Gestão do Transporte</h2>
            <button onclick="fazerLogout()" class="btn-sair">Sair do Painel</button>
        </div>
    </header>

    <main class="area-portal" style="max-width: 1200px; margin: 20px auto; padding: 0 15px;">
        
        <div id="mensagem-carregamento">
            ⏳ Carregando base de dados... Por favor, aguarde.
        </div>

        <div id="conteudo-painel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <div>
                    <h3>Lista Geral de Estudantes</h3>
                    <p>Faça a gestão dos alunos cadastrados no sistema.</p>
                </div>
                <button class="btn-adicionar" onclick="abrirModal()">+ Novo Aluno</button>
            </div>
            
            <div class="tabela-container">
                <table id="tabela-alunos">
                    <thead>
                        <tr>
                            <th>Nome do Aluno</th>
                            <th>CPF</th>
                            <th>Instituição</th>
                            <th>Turno</th>
                            <th>Rota/Ônibus</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        <!-- Os dados serão injetados aqui via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- MODAL DE CADASTRO / EDIÇÃO -->
    <div id="modal-aluno" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; color: #0056b3;">Adicionar Novo Aluno</h3>
            <form id="form-aluno" onsubmit="salvarAluno(event)">
                <input type="hidden" id="aluno-id"> <!-- Usado para guardar o CPF na hora de editar -->
                
                <div class="form-group">
                    <label>Nome Completo:</label>
                    <input type="text" id="aluno-nome" required>
                </div>
                <div class="form-group">
                    <label>CPF:</label>
                    <input type="text" id="aluno-cpf" required placeholder="Apenas números ou com pontuação">
                </div>
                <div class="form-group">
                    <label>Instituição:</label>
                    <input type="text" id="aluno-instituicao" required>
                </div>
                <div class="form-group">
                    <label>Turno:</label>
                    <select id="aluno-turno" required>
                        <option value="">Selecione...</option>
                        <option value="Manhã">Manhã</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                        <option value="Integral">Integral</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ônibus/Rota:</label>
                    <select id="aluno-onibus" required>
                        <option value="">Selecione...</option>
                        <option value="AMARELO">AMARELO</option>
                        <option value="AZUL">AZUL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status / Prioridade:</label>
                    <select id="aluno-status" required>
                        <option value="Pendente">Pendente</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Prioridade">Prioridade (Fura Fila)</option>
                        <option value="Reprovado">Reprovado</option>
                    </select>
                </div>
                
                <div class="modal-acoes">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar Dados</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. URL do seu Google Apps Script
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyLQYmr628VW5a31NMMjeXYmylth9uwqV-DVYLxs8cH4cF_lTv1F3zoEw9rmC7Z6KY/exec";

        // 2. Verificar se o administrador tem permissão (Token)
        const tokenAdmin = sessionStorage.getItem("admin_token");

        if (!tokenAdmin) {
            alert("Acesso restrito. Por favor, faça login primeiro.");
            window.location.href = "admin.html";
        } else {
            carregarDadosDaPlanilha();
        }

        // 3. Função para buscar os dados
        function carregarDadosDaPlanilha() {
            fetch(`${URL_APPS_SCRIPT}?acao=painel_admin&token=${tokenAdmin}`)
                .then(resposta => resposta.json())
                .then(dados => {
                    document.getElementById('mensagem-carregamento').style.display = 'none';

                    if (dados.sucesso) {
                        document.getElementById('conteudo-painel').style.display = 'block';
                        renderizarTabela(dados.dadosGerais);
                    } else {
                        alert("Erro de permissão: " + dados.erro);
                        fazerLogout();
                    }
                })
                .catch(erro => {
                    console.error(erro);
                    document.getElementById('mensagem-carregamento').innerText = "Erro ao conectar com o servidor. Verifique a sua internet.";
                    document.getElementById('mensagem-carregamento').style.color = "red";
                });
        }

        // 4. Função para desenhar a tabela na tela
        function renderizarTabela(alunos) {
            const corpoTabela = document.getElementById('corpo-tabela');
            corpoTabela.innerHTML = ""; 

            // Salvamos a lista no Windows para facilitar na hora de clicar em "Editar"
            window.listaAlunosGlobais = alunos;

            alunos.forEach((aluno, index) => {
                const tr = document.createElement('tr');
                
                // Formatação de cor para o Status
                let classeStatus = "";
                const statusTexto = (aluno.status || "").toLowerCase();
                if (statusTexto.includes("aprovado")) classeStatus = "status-aprovado";
                else if (statusTexto.includes("pendente")) classeStatus = "status-pendente";
                else if (statusTexto.includes("prioridade")) classeStatus = "status-aprovado"; 
                else classeStatus = "status-reprovado";

                tr.innerHTML = `
                    <td>${aluno.nome || "-"}</td>
                    <td>${aluno.cpf || "-"}</td>
                    <td>${aluno.instituicao || "-"}</td>
                    <td>${aluno.turno || "-"}</td>
                    <td>${aluno.onibus || "-"}</td>
                    <td class="${classeStatus}">${aluno.status || "-"}</td>
                    <td>
                        <button class="btn-acao btn-editar" onclick="abrirModal(${index})">✏️ Editar</button>
                        <button class="btn-acao btn-excluir" onclick="excluirAluno('${aluno.cpf}')">🗑️ Excluir</button>
                    </td>
                `;
                
                corpoTabela.appendChild(tr);
            });
        }

        // --- FUNÇÕES DO PAINEL DE CONTROLO (CRUD) ---

        function abrirModal(index = -1) {
            const modal = document.getElementById('modal-aluno');
            const titulo = document.getElementById('modal-titulo');
            const form = document.getElementById('form-aluno');
            
            form.reset(); // Limpa o formulário
            
            if (index >= 0) {
                // Modo Edição: Puxa os dados da tabela para o formulário
                titulo.innerText = "Editar Aluno";
                const aluno = window.listaAlunosGlobais[index];
                
                document.getElementById('aluno-id').value = aluno.cpf; // Guardamos o CPF antigo para procurar no banco
                document.getElementById('aluno-nome').value = aluno.nome || "";
                document.getElementById('aluno-cpf').value = aluno.cpf || "";
                document.getElementById('aluno-instituicao').value = aluno.instituicao || "";
                document.getElementById('aluno-turno').value = aluno.turno || "";
                document.getElementById('aluno-onibus').value = aluno.onibus || "";
                document.getElementById('aluno-status').value = aluno.status || "Pendente";
            } else {
                // Modo Adicionar
                titulo.innerText = "Adicionar Novo Aluno";
                document.getElementById('aluno-id').value = "";
            }
            
            modal.style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('modal-aluno').style.display = 'none';
        }

        function salvarAluno(event) {
            event.preventDefault(); 
            
            const cpfAntigo = document.getElementById('aluno-id').value;
            const acaoBotao = cpfAntigo ? "editar_aluno" : "adicionar_aluno";
            
            // Pega todos os valores digitados no formulário
            const dadosAluno = {
                acao: acaoBotao,
                token: tokenAdmin,
                cpfAntigo: cpfAntigo, 
                nome: document.getElementById('aluno-nome').value,
                cpf: document.getElementById('aluno-cpf').value,
                instituicao: document.getElementById('aluno-instituicao').value,
                turno: document.getElementById('aluno-turno').value,
                onibus: document.getElementById('aluno-onibus').value,
                status: document.getElementById('aluno-status').value
            };

            const btnSalvar = document.querySelector('.btn-salvar');
            btnSalvar.innerText = "A salvar no Google...";
            btnSalvar.disabled = true;

            // Envia os novos dados (Método POST) para o Google Apps Script
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                body: JSON.stringify(dadosAluno),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain evita erro de bloqueio CORS
            })
            .then(resposta => resposta.json())
            .then(dados => {
                if (dados.sucesso) {
                    alert("✅ Guardado com sucesso!");
                    fecharModal();
                    
                    // Mostra o loading e atualiza a tabela
                    document.getElementById('conteudo-painel').style.display = 'none';
                    document.getElementById('mensagem-carregamento').innerText = "A atualizar tabela...";
                    document.getElementById('mensagem-carregamento').style.display = 'block';
                    
                    carregarDadosDaPlanilha(); 
                } else {
                    alert("❌ Erro ao guardar: " + dados.erro);
                }
            })
            .catch(erro => {
                alert("✅ Comando enviado para a folha de cálculo. A recarregar página...");
                fecharModal();
                setTimeout(carregarDadosDaPlanilha, 2000); 
            })
            .finally(() => {
                btnSalvar.innerText = "Guardar Dados";
                btnSalvar.disabled = false;
            });
        }

        function excluirAluno(cpf) {
            if (confirm("⚠️ Tem a certeza que deseja EXCLUIR este aluno da base de dados? Esta ação não pode ser desfeita.")) {
                
                document.getElementById('mensagem-carregamento').innerText = "🗑️ A excluir aluno...";
                document.getElementById('mensagem-carregamento').style.display = 'block';
                document.getElementById('conteudo-painel').style.display = 'none';

                fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ acao: "excluir_aluno", token: tokenAdmin, cpf: cpf }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                })
                .then(resposta => resposta.json())
                .then(dados => {
                    if (dados.sucesso) {
                        alert("✅ Aluno excluído com sucesso!");
                        carregarDadosDaPlanilha();
                    } else {
                        alert("❌ Erro: " + dados.erro);
                        carregarDadosDaPlanilha();
                    }
                })
                .catch(erro => {
                    alert("✅ Comando de exclusão enviado. A atualizar a lista...");
                    setTimeout(carregarDadosDaPlanilha, 2000);
                });
            }
        }

        // 5. Função de Logout
        function fazerLogout() {
            sessionStorage.removeItem("admin_token"); 
            window.location.href = "admin.html"; 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Azul - Transporte Universitário Graça/CE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-blue: #0056b3; --dark-blue: #003d80; --light-blue: #e7f1ff; --text-muted: #636e72; --border-radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-image: url('fundo-login.jpg'); background-size: cover; background-attachment: fixed; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }
        .cabecalho-oficial { padding: 20px; display: flex; justify-content: center; }
        .pill-logo { background: white; padding: 10px 25px; border-radius: 50px; }
        .pill-logo img { height: 45px; }
        .main-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); max-width: 800px; width: 100%; border-radius: var(--border-radius); overflow: hidden; }
        .card-header { background-color: var(--primary-blue); color: white; padding: 30px; text-align: center; }
        .card-body { padding: 30px; text-align: center; }
        .cpf-input { width: 100%; max-width: 320px; padding: 15px; margin: 20px auto; display: block; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        .btn-primary { background-color: var(--primary-blue); color: white; border: none; padding: 15px 35px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; width: 100%; max-width: 320px; margin: 0 auto; display: block; }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
        .msg-erro { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; }
        .msg-erro.show { display: block; }
    </style>
</head>
<body>
    <header class="cabecalho-oficial">
        <div class="pill-logo"><img src="Logo prefeitura.png" alt="Governo de Graça"></div>
    </header>

    <div class="main-container">
        <section id="login-section" class="glass-card" style="max-width: 450px;">
            <div class="card-header">
                <h2>🚌 Ônibus Azul</h2>
                <p>Portal do Passageiro</p>
            </div>
            <div class="card-body">
                <p style="color: var(--text-muted);">Informe seu CPF para acessar sua rota.</p>
                <input type="text" id="cpfInput" class="cpf-input" placeholder="000.000.000-00" maxlength="14">
                <button id="btnEntrar" class="btn-primary" onclick="verificarAcesso()">Acessar Painel</button>
                <div id="msgBox" class="msg-erro"></div>
                <div style="margin-top: 25px;"><a href="index.html" style="color: var(--text-muted); text-decoration: none;">← Voltar ao Início</a></div>
            </div>
        </section>

        <main id="main-section" class="glass-card" style="display: none;">
            <div class="card-header">
                <h2>🚌 Rota: Ônibus Azul</h2>
                <p>Olá, <span id="nomeAlunoLogado" style="font-weight: 700;"></span>!</p>
            </div>
            <div class="card-body">
                <p>✅ <b>Acesso Liberado!</b> Você está na lista oficial deste veículo.</p>
                <button onclick="location.reload()" class="btn-primary" style="background-color: #636e72; margin-top: 30px;">Sair do Painel</button>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwOmGvAcKgiIMEKZBrRD6zofIbTeMBdxiwW353J12ENW8Wf2hYAZ32UytOERnqorAs/exec";

        document.getElementById('cpfInput').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 3) v = v.replace(/^(\d{3})(\d)/, '$1.$2');
            if (v.length > 6) v = v.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
            if (v.length > 9) v = v.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
            e.target.value = v;
        });

        function mostrarMensagem(texto, bg, cor) {
            const box = document.getElementById('msgBox');
            box.innerHTML = texto; box.style.backgroundColor = bg; box.style.color = cor;
            box.classList.add('show');
        }

        async function verificarAcesso() {
            const cpfDigitado = document.getElementById('cpfInput').value.replace(/\D/g, '');
            const btn = document.getElementById('btnEntrar');
            
            if (cpfDigitado.length !== 11) { mostrarMensagem('⚠️ Informe o CPF completo.', '#fff3cd', '#856404'); return; }

            btn.innerHTML = '🔄 Consultando servidor...'; btn.disabled = true;
            mostrarMensagem('📡 Conectando à base de dados da prefeitura...', '#e7f1ff', '#003d80');

            try {
                // AQUI ESTÁ A MÁGICA: Ação e Rota na URL
                const response = await fetch(`${API_URL}?acao=login_rota&rota=AZUL&cpf=${cpfDigitado}`);
                const data = await response.json();

                if (data.erro) {
                    mostrarMensagem(data.erro, '#f8d7da', '#721c24');
                    btn.innerHTML = 'Acessar Painel'; btn.disabled = false; return;
                }

                if (data.sucesso) {
                    document.getElementById('msgBox').style.display = 'none';
                    document.getElementById('nomeAlunoLogado').innerText = data.dados.nome;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-section').style.display = 'block';
                }
            } catch (erro) {
                mostrarMensagem('❌ Servidor indisponível no momento.', '#f8d7da', '#721c24');
                btn.innerHTML = 'Acessar Painel'; btn.disabled = false;
            }
        }
    </script>
</body>
</html>

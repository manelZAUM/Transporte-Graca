<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Secretaria - Graça</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Mantendo seus estilos originais do Dashboard */
        .dashboard-grid-admin { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee;
        }
        .dash-card-admin { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; 
            transition: transform 0.2s; border-top: 4px solid var(--verde-principal);
        }
        .dash-card-admin.clicavel { cursor: pointer; }
        .dash-card-admin.clicavel:hover { transform: translateY(-5px); }
        .dash-card-admin h3 { color: #555; font-size: 15px; margin-bottom: 10px; }
        .dash-card-admin .numero { font-size: 32px; font-weight: bold; color: var(--verde-escuro); }
        .inst-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #eee; cursor: pointer; }
        #aviso-filtro { display: none; background: #eef5fa; padding: 10px 20px; border-left: 4px solid #0056b3; margin: 20px; align-items: center; justify-content: space-between; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--fundo); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="card" style="padding:40px; text-align:center; max-width: 400px;">
            <h2 style="color:var(--verde-principal); margin-bottom:20px;">Acesso Restrito</h2>
            <p style="margin-bottom: 20px; color: #666;">Faça login com uma conta autorizada da Secretaria</p>
            <div id="g_id_onload" data-client_id="902660911703-a0g6tp2fg4uajfl0mo22aodmf827aod7.apps.googleusercontent.com" data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" style="display: flex; justify-content: center;"></div>
            <p id="erro-login" style="color:red; display:none; margin-top:15px; font-weight:bold;"></p>
            <br><br><a href="index.html" style="color:var(--verde-escuro); text-decoration:none;">⬅ Voltar ao Início</a>
        </div>
    </div>

    <div id="painel-conteudo"></div>

    <template id="tpl-admin">
        <header><img src="Captura de tela 2026-02-23 080257.png" alt="Governo Municipal de Graça" class="logo-prefeitura"></header>

        <div class="admin-table-container">
            <div class="card-header"><h2>📊 Gestão de Cadastros</h2></div>
            
            <div id="dashboard-admin" class="dashboard-grid-admin"></div>

            <div id="aviso-filtro">
                <span id="texto-filtro" style="font-weight: bold; color: #0056b3;">👁️ Filtrando por...</span>
                <button onclick="limparFiltro()" class="btn" style="padding: 5px 15px; background: #dc3545; color: white; margin: 0;">✖ Limpar Filtro</button>
            </div>

            <div style="padding:20px; display:flex; gap:10px; flex-wrap: wrap; align-items: center; background: #f8f9fa; border-bottom: 1px solid #eee;">
                <input type="text" id="busca" placeholder="Buscar por nome ou protocolo..." onkeyup="renderizar()" style="padding:10px; flex:1; min-width: 200px; border-radius:5px; border:1px solid #ccc;">
                <button onclick="abrirCadastro()" class="btn btn-aluno" style="width:auto; padding:10px 20px; margin:0;">➕ Novo Cadastro</button>
                <button onclick="exportar()" class="btn btn-admin" style="width:auto; padding:10px 20px; margin:0;">📥 Exportar Excel</button>
                <button onclick="sairPainel()" class="btn" style="background:#555; color:white; width:auto; padding:10px 20px;">🚪 Sair</button>
            </div>

            <div id="area-cadastro" style="display:none; background: white; border-bottom: 3px solid var(--verde-principal); padding: 30px;">
                <h3 id="titulo-form" style="color: var(--verde-principal); margin-bottom: 20px;">📝 Ficha do Aluno</h3>
                <form id="formCadastro">
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom:15px;">
                        <div style="flex: 2;"><label>Nome Completo</label><input type="text" id="nome" required></div>
                        <div style="flex: 1;"><label>Nascimento</label><input type="text" id="nascimento" placeholder="DD/MM/AAAA" required></div>
                    </div>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom:15px;">
                        <div style="flex: 1;"><label>RG</label><input type="text" id="rg" oninput="mRG(this)" required></div>
                        <div style="flex: 1;"><label>CPF</label><input type="text" id="cpf" oninput="mCPF(this)" placeholder="000.000.000-00" required></div>
                        <div style="flex: 1;"><label>WhatsApp</label><input type="text" id="telefone" oninput="mTel(this)" placeholder="(88) 9XXXX-XXXX" required></div>
                    </div>
                    <div style="margin-bottom:15px;"><label>Endereço Completo</label><input type="text" id="endereco" required></div>
                    
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom:15px;">
                        <div style="flex: 1;">
                            <label>Instituição</label>
                            <select id="instituicao" required onchange="verificarOutra()">
                                <option value="">Selecione...</option>
                                <option value="UVA-Campus CIDAO">UVA-Campus CIDAO</option>
                                <option value="UVA-Campus CCS">UVA-Campus CCS</option>
                                <option value="UVA-Campus BETÂNIA">UVA-Campus BETÂNIA</option>
                                <option value="UVA-Campus CCH">UVA-Campus CCH</option>    
                                <option value="IFCE">IFCE</option><option value="UNINTA">UNINTA</option><option value="UFC">UFC</option><option value="FLF">FLF</option><option value="OUTRA">OUTRA</option>
                            </select>
                            <input type="text" id="inst_outra" style="display:none; margin-top:5px;">
                        </div>
                        <div style="flex: 1;">
                            <label>Ponto de Embarque</label>
                            <select id="embarque" required>
                                <option value="">Selecione...</option><option value="SEDE">SEDE</option><option value="BARRO VERMELHO">BARRO VERMELHO</option>
                                <option value="LAPA">LAPA</option><option value="VILA">VILA</option>
                            </select>
                        </div>
                    </div>

                    <div style="background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom:15px;">
                        <label>Turno Principal</label>
                        <select id="turno" required style="margin-bottom:10px;">
                            <option value="">Selecione...</option><option value="MANHÃ">MANHÃ</option><option value="TARDE">TARDE</option><option value="NOITE">NOITE</option>
                        </select>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="checkbox" id="chk_prin_SEGUNDA" value="SEGUNDA"> SEG</label>
                            <label><input type="checkbox" id="chk_prin_TERÇA" value="TERÇA"> TER</label>
                            <label><input type="checkbox" id="chk_prin_QUARTA" value="QUARTA"> QUA</label>
                            <label><input type="checkbox" id="chk_prin_QUINTA" value="QUINTA"> QUI</label>
                            <label><input type="checkbox" id="chk_prin_SEXTA" value="SEXTA"> SEX</label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="btnSubmit" class="btn btn-aluno" style="padding: 12px 25px;">💾 Salvar</button>
                        <button type="button" onclick="fecharCadastro()" class="btn" style="background:#ccc;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="table-responsive">
                <table>
                    <thead><tr><th>Protocolo</th><th>Nome</th><th>Instituição</th><th>Embarque</th><th>Prioridade</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="lista"><tr><td colspan="7" style="text-align:center; padding: 30px;">⏳ Carregando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </template>

    <script>
        const EMAILS_AUTORIZADOS = ["manoelfariaspr@gmail.com"]; 
        const API_URL = "https://script.google.com/macros/s/AKfycbyQljrcnkEox6t6IKcBvYx2wSsSoLrA8NEMGvLjK4L5sVFmqo_hxP68iEiNdbUE5xg/exec";
        let dadosNuvem = [];
        let idEdicaoAtual = null;
        let filtroGlobal = { tipo: null, valor: null };

        // --- MÁSCARAS ---
        function mCPF(i){ i.value=i.value.replace(/\D/g,"").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2").substring(0,14); }
        function mTel(i){ i.value=i.value.replace(/\D/g,"").replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d{5})(\d)/,"$1-$2").substring(0,15); }
        function mRG(i){ i.value=i.value.replace(/\D/g,"").substring(0,12); }

        function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            if (EMAILS_AUTORIZADOS.includes(payload.email)) {
                sessionStorage.setItem('sec_logado', 'sim');
                ativarPainel();
            } else {
                alert("Acesso negado para: " + payload.email);
            }
        }

        function ativarPainel() {
            document.getElementById('login-screen').style.display = 'none';
            const tpl = document.getElementById('tpl-admin');
            document.getElementById('painel-conteudo').appendChild(tpl.content.cloneNode(true));
            
            // Re-vincula o evento do formulário que acabou de ser criado
            document.getElementById('formCadastro').addEventListener('submit', salvar);
            buscarDadosNuvem();
        }

        function buscarDadosNuvem() {
            fetch(API_URL).then(res => res.json()).then(data => {
                dadosNuvem = data.reverse();
                atualizarDashboardAdmin();
                renderizar();
            }).catch(() => { if(document.getElementById('lista')) document.getElementById('lista').innerHTML = '<tr><td colspan="7">Erro de conexão.</td></tr>'; });
        }

        function salvar(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "Enviando...";

            let diasFinais = [];
            let turnoPrin = document.getElementById('turno').value;
            ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA'].forEach(dia => {
                if(document.getElementById('chk_prin_'+dia).checked) diasFinais.push(dia + "-" + turnoPrin);
            });

            let instFinal = document.getElementById('instituicao').value;
            if(instFinal === 'OUTRA') instFinal = document.getElementById('inst_outra').value;

            const dados = {
                action: idEdicaoAtual ? "edit" : "add",
                id: idEdicaoAtual || Date.now().toString(),
                proto: "GR-" + Math.floor(Math.random() * 90000 + 10000),
                nome: document.getElementById('nome').value,
                nascimento: document.getElementById('nascimento').value,
                rg: document.getElementById('rg').value,
                cpf: document.getElementById('cpf').value,
                endereco: document.getElementById('endereco').value,
                telefone: document.getElementById('telefone').value,
                instituicao: instFinal,
                turno: turnoPrin,
                dias: diasFinais.join(', '),
                embarque: document.getElementById('embarque').value,
                status: 'Aprovado'
            };

            fetch(API_URL, { method: 'POST', body: JSON.stringify(dados) })
            .then(() => { alert("Sucesso!"); fecharCadastro(); buscarDadosNuvem(); })
            .finally(() => { btn.disabled = false; btn.innerText = "💾 Salvar"; });
        }

        function renderizar() {
            const busca = document.getElementById('busca').value.toLowerCase();
            const tbody = document.getElementById('lista');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            dadosNuvem.forEach(aluno => {
                if(aluno.nome.toLowerCase().includes(busca)) {
                    tbody.innerHTML += `<tr>
                        <td>${aluno.proto}</td>
                        <td>${aluno.nome}</td>
                        <td>${aluno.instituicao}</td>
                        <td>${aluno.embarque}</td>
                        <td>${aluno.comorbidade === 'Sim' ? '♿' : 'Não'}</td>
                        <td style="color:green"><strong>${aluno.status}</strong></td>
                        <td>
                            <button onclick="remover('${aluno.id}', this)">❌</button>
                        </td>
                    </tr>`;
                }
            });
        }

        function remover(id, btn) {
            if(confirm("Excluir?")) {
                btn.disabled = true;
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "delete", id: id }) })
                .then(() => buscarDadosNuvem());
            }
        }

        function atualizarDashboardAdmin() {
            const total = dadosNuvem.filter(a => a.status === 'Aprovado').length;
            const dash = document.getElementById('dashboard-admin');
            if(dash) dash.innerHTML = `<div class="dash-card-admin"><h3>👥 Total Aprovados</h3><div class="numero">${total}</div></div>`;
        }

        function abrirCadastro() { document.getElementById('area-cadastro').style.display = 'block'; }
        function fecharCadastro() { document.getElementById('area-cadastro').style.display = 'none'; idEdicaoAtual = null; document.getElementById('formCadastro').reset(); }
        function verificarOutra() { document.getElementById('inst_outra').style.display = (document.getElementById('instituicao').value === 'OUTRA' ? 'block' : 'none'); }
        function sairPainel() { sessionStorage.removeItem('sec_logado'); window.location.reload(); }

        window.onload = () => { if(sessionStorage.getItem('sec_logado') === 'sim') ativarPainel(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema em Manutenção</title>
    <style>
        /* Reset básico e estilização do corpo */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; /* Fundo cinza bem claro e neutro */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Card centralizado */
        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
        }

        /* Título e Texto */
        h1 {
            color: #2c3e50; /* Azul escuro profissional */
            font-size: 26px;
            margin-bottom: 15px;
            margin-top: 0;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Destaque para o horário */
        .aviso-horario {
            background-color: #e8f4fd;
            color: #1a73e8;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Ícone animado (opcional, traz um charme) */
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Voltamos Logo!</h1>
        <p>Estamos realizando uma manutenção programada para implementar melhorias e garantir que o sistema funcione da melhor forma possível.</p>
        
        <div class="aviso-horario">
            Previsão de retorno: <strong>segunda-feira</strong>
        </div>
        
        <p style="font-size: 14px; color: #888; margin-top: 20px;">
            Agradecemos a paciência!
        </p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Amarela - Transporte Universitário Graça/CE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-yellow: #f1c40f;
            --dark-yellow: #d4ac0d;
            --light-yellow: #fef9e7;
            --error-red: #dc3545;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif;
            background-image: url('fundo-login.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark);
            transition: background-image 0.8s ease;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .cabecalho-oficial { padding: 20px; display: flex; justify-content: center; }
        .pill-logo { background: white; padding: 10px 25px; border-radius: 50px; box-shadow: var(--shadow); }
        .pill-logo img { height: 45px; }

        .main-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            max-width: 800px;
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header {
            background-color: var(--primary-yellow);
            color: #fffbfb;
            padding: 30px;
            text-align: center;
        }

        .card-body { padding: 30px; }

        .cpf-input {
            width: 100%; max-width: 320px; padding: 15px; margin: 20px auto;
            display: block; border: 2px solid #ddd; border-radius: 8px;
            font-size: 18px; text-align: center;
        }

        .btn-primary {
            background-color: var(--primary-yellow);
            color: #fffbfb; border: none; padding: 15px 35px;
            font-size: 16px; font-weight: 700; border-radius: 8px;
            cursor: pointer; width: 100%; max-width: 320px;
            display: block; margin: 0 auto; transition: 0.3s;
        }

        .btn-primary:hover { background-color: var(--dark-yellow); transform: scale(1.02); }

        .tabs-label { font-weight: 600; color: #856404; margin: 20px 0 10px; text-align: center; }
        .tabs-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

        .btn-tab {
            padding: 10px 18px; border: 1px solid #ddd; background: white;
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
        }

        .btn-tab.ativo {
            background-color: var(--primary-yellow);
            color: #000; border-color: var(--primary-yellow);
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }

        #mapa-rota { width: 100%; height: 300px; border-radius: var(--border-radius); margin: 15px 0; }

        .table-wrapper { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #fffdf5; padding: 15px; text-align: left; font-size: 14px; color: var(--text-muted); }
        td { padding: 15px; border-top: 1px solid #eee; font-size: 14px; }

        .msg-erro { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; }
        .msg-erro.show { display: block; }
    </style>
</head>
<body>

    <header class="cabecalho-oficial">
        <div class="pill-logo">
            <img src="img/captura-de-tela-2026-02-23-080257-1.png" alt="Governo Municipal de Graça">
        </div>
    </header>

    <div class="main-container">
        <section id="login-section" class="glass-card" style="max-width: 450px;">
            <div class="card-header">
                <h2>🚌 Ônibus Amarelo</h2>
                <p style="font-size: 14px;">Acesso à Rota Amarela</p>
            </div>
            <div class="card-body">
                <input type="text" id="cpfInput" class="cpf-input" placeholder="000.000.000-00" maxlength="14">
                <button id="btnEntrar" class="btn-primary" onclick="verificarAcesso()">Acessar Painel</button>
                <div id="msgBox" class="msg-erro"></div>
                <div style="margin-top: 25px; text-align: center;">
                    <a href="index.html" style="color: var(--text-muted); font-size: 14px; text-decoration: none;">← Voltar ao Início</a>
                </div>
            </div>
        </section>

        <main id="main-section" class="glass-card" style="display: none;">
            <div class="card-header">
                <h2>🚌 Rota: Ônibus Amarelo</h2>
                <p>Olá, <span id="nomeAlunoLogado" style="font-weight: 700;"></span>!</p>
            </div>
            
            <div class="card-body">
                <div style="background: var(--light-yellow); padding: 20px; border-radius: var(--border-radius); border-left: 5px solid var(--primary-yellow);">
                    <h4 style="color: #856404; margin-bottom: 10px;">🗺️ Trajeto Oficial</h4>
                    <div id="mapa-rota"></div>
                </div>

                <div class="tabs-label">Selecione o Turno</div>
                <div class="tabs-container" id="filtro-turno">
                    <button class="btn-tab ativo" onclick="selecionarTab('turno', this)">MANHÃ</button>
                    <button class="btn-tab" onclick="selecionarTab('turno', this)">NOITE</button>
                </div>

                <div class="tabs-label">Selecione o Dia</div>
                <div class="tabs-container" id="filtro-dia">
                    <button class="btn-tab ativo" onclick="selecionarTab('dia', this)">SEG</button>
                    <button class="btn-tab" onclick="selecionarTab('dia', this)">TER</button>
                    <button class="btn-tab" onclick="selecionarTab('dia', this)">QUA</button>
                    <button class="btn-tab" onclick="selecionarTab('dia', this)">QUI</button>
                    <button class="btn-tab" onclick="selecionarTab('dia', this)">SEX</button>
                </div>

                <div id="conteudo-rota" class="table-wrapper"></div>

                <button onclick="location.reload()" class="btn-primary" style="background-color: #636e72; color: white; margin-top: 30px; max-width: 200px;">Sair</button>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL ="https://script.google.com/macros/s/AKfycbxWQe4jSBRRJDbtU47NNo90BHsHFT0I0orI-jRM46susVLlctFs0BLyMtddX2nI9mQ/exec";
        let dadosNuvem = [];

        document.getElementById('cpfInput').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 3) v = v.replace(/^(\d{3})(\d)/, '$1.$2');
            if (v.length > 6) v = v.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
            if (v.length > 9) v = v.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
            e.target.value = v;
        });

        async function verificarAcesso() {
            const cpfDigitado = document.getElementById('cpfInput').value.replace(/\D/g, '');
            const btn = document.getElementById('btnEntrar');
            if (cpfDigitado.length !== 11) { return; }

            btn.innerText = 'Buscando...'; btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}?cpf=${cpfDigitado}`);
                const data = await response.json();
                dadosNuvem = data;
                
                const aluno = dadosNuvem.find(a => a.cpf.replace(/\D/g, '') === cpfDigitado);

                if (aluno && aluno.status === "Aprovado") {
                    document.getElementById('nomeAlunoLogado').innerText = aluno.nome;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-section').style.display = 'block';
                    carregarMapa();
                    atualizarPainel();
                } else {
                    alert("Acesso negado ou cadastro pendente.");
                    btn.innerText = 'Acessar Painel'; btn.disabled = false;
                }
            } catch (e) { alert("Erro de conexão."); btn.disabled = false; }
        }

        function carregarMapa() {
            const map = L.map('mapa-rota').setView([-3.86, -40.54], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function selecionarTab(grupo, el) {
            el.parentElement.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('ativo'));
            el.classList.add('ativo');
            atualizarPainel();
        }

        function atualizarPainel() {
            // Aqui entra a lógica de filtragem igual à página azul
            const painel = document.getElementById('conteudo-rota');
            painel.innerHTML = "<p style='padding:20px; text-align:center;'>Carregando lista de passageiros...</p>";
            // Implementar renderização da tabela conforme dadosNuvem
        }
    </script>
</body>
</html>

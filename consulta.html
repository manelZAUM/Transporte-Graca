<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Logística - Graça/CE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { 
            max-width: 450px; margin: 80px auto; padding: 40px; 
            background: white; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
        }
        /* Dashboard adaptável para caber os 8 cards de forma organizada */
        .dashboard-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; margin-bottom: 30px; 
        }
        .dash-card { 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--verde-principal); 
            text-align: center; 
        }
        .dash-card h3 { font-size: 14px; color: #555; margin-bottom: 5px; }
        .dash-card .numero { font-size: 26px; font-weight: bold; color: var(--verde-escuro); }
        .inst-list { text-align: left; font-size: 13px; margin-top: 10px; max-height: 120px; overflow-y: auto; padding: 8px; background: #f9f9f9; border-radius: 5px; }
        .inst-list div { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body style="background-color: var(--fundo);">
    <header>
        <img src="Captura de tela 2026-02-23 080257.png" alt="Prefeitura de Graça" class="logo-prefeitura">
    </header>

    <main class="main-content">
        <div id="validacao-acesso" class="login-box">
            <h2 style="color: var(--verde-escuro); margin-bottom: 15px;">Acesso ao Painel</h2>
            <p style="color: #666; margin-bottom: 25px;">Informe o seu CPF cadastrado no transporte para visualizar a logística e a lista de alunos.</p>
            
            <input type="text" id="chave-cpf" oninput="mCPF(this)" placeholder="000.000.000-00" 
                   style="width: 100%; padding: 15px; font-size: 18px; text-align: center; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 20px;">
            
            <button onclick="validarAcesso()" id="btn-entrar" class="btn btn-aluno" style="width: 100%; padding: 15px;" disabled>⏳ Conectando ao sistema...</button>
            
            <div id="erro-chave" style="display:none; color: #d9534f; margin-top: 15px; font-weight: bold;">❌ CPF não encontrado nos registros.</div>
            <br><br>
            <a href="index.html" style="color: #888; text-decoration: none; font-size: 13px;">⬅ Voltar ao Início</a>
        </div>

        <div id="conteudo-painel" style="display: none; width: 100%; max-width: 1100px; margin: 0 auto;"></div>
    </main>

    <template id="tpl-dashboard">
        <div class="admin-table-container" style="padding: 20px;">
            <h2 style="color: var(--verde-escuro); margin-bottom: 25px; text-align: center;">📊 Painel de Logística - Transporte Universitário</h2>
            
            <div class="dashboard-grid">
                <div class="dash-card"><h3>👥 Total</h3><div class="numero" id="total-alunos">0</div></div>
                <div class="dash-card" style="border-top-color: #28a745;"><h3>🆕 Novatos</h3><div class="numero" id="total-novatos" style="color: #28a745;">0</div></div>
                <div class="dash-card" style="border-top-color: #17a2b8;"><h3>🏠 Residentes</h3><div class="numero" id="total-residentes" style="color: #17a2b8;">0</div></div>
                <div class="dash-card" style="border-top-color: #6f42c1;"><h3>🏢 Sede</h3><div class="numero" id="emb-sede">0</div></div>
                <div class="dash-card" style="border-top-color: #fd7e14;"><h3>🔴 Barro Vermelho</h3><div class="numero" id="emb-barro">0</div></div>
                <div class="dash-card" style="border-top-color: #20c997;"><h3>⛪ Lapa</h3><div class="numero" id="emb-lapa">0</div></div>
                <div class="dash-card" style="border-top-color: #e83e8c;"><h3>🏘️ Vila</h3><div class="numero" id="emb-vila">0</div></div>
                <div class="dash-card"><h3>🏫 Instituições</h3><div class="inst-list" id="lista-instituicoes"></div></div>
            </div>

            <div class="card-header" style="background-color: var(--verde-escuro); border-radius: 8px 8px 0 0;">
                <h2 style="font-size: 16px;">🔍 Lista de Passageiros (Ordem Alfabética)</h2>
            </div>
            <div style="padding:15px; background: white; border-bottom: 1px solid #eee;">
                <input type="text" id="busca" placeholder="Filtrar por nome ou faculdade..." onkeyup="renderizarTabela()" 
                       style="padding:10px; width: 100%; border-radius:5px; border:1px solid #ccc;">
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>#</th><th>Nome do Aluno</th><th>Instituição</th><th>Embarque</th><th>Turno</th></tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
            <div style="text-align: center; padding: 20px;">
                <button onclick="window.location.reload()" class="btn" style="background: #555; color: white; width: auto;">Sair do Painel</button>
            </div>
        </div>
    </template>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzTR1SVXsEcb0fLwpBWlM3DmKuvt8QkcKatHJuK0O9J7MW1KWFPZ0xVV2YFS52zNnA/exec";
        let dadosNuvem = [];

        function mCPF(i){ i.value=i.value.replace(/\D/g,"").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2").substring(0,14); }

        // Carrega o banco de dados invisivelmente
        window.onload = () => {
            fetch(API_URL).then(res => res.json()).then(data => {
                // Deixa os dados em ordem alfabética A-Z
                dadosNuvem = data.sort((a, b) => a.nome.localeCompare(b.nome)); 
                
                // Libera o botão para o usuário entrar
                const btn = document.getElementById('btn-entrar');
                btn.disabled = false;
                btn.innerText = "Acessar Logística";
            }).catch(() => {
                document.getElementById('btn-entrar').innerText = "❌ Erro ao conectar. Atualize a página.";
            });
        };

        function validarAcesso() {
            const inputCpf = document.getElementById('chave-cpf').value;
            const erro = document.getElementById('erro-chave');

            if (inputCpf.length < 14) {
                alert("Por favor, digite o CPF completo.");
                return;
            }

            // Verifica se o CPF digitado existe em algum cadastro
            const alunoCadastrado = dadosNuvem.some(aluno => aluno.cpf === inputCpf);

            if (alunoCadastrado) {
                document.getElementById('validacao-acesso').style.display = 'none';
                const painel = document.getElementById('conteudo-painel');
                painel.appendChild(document.getElementById('tpl-dashboard').content.cloneNode(true));
                painel.style.display = 'block';
                
                atualizarResumo();
                renderizarTabela();
            } else {
                erro.style.display = 'block';
            }
        }

        function atualizarResumo() {
            const aprovados = dadosNuvem.filter(a => a.status === 'Aprovado');
            
            // Popula todos os 8 cards
            document.getElementById('total-alunos').innerText = aprovados.length;
            document.getElementById('total-novatos').innerText = aprovados.filter(a => a.novato === 'Sim').length;
            document.getElementById('total-residentes').innerText = aprovados.filter(a => a.sobral === 'Sim').length;
            document.getElementById('emb-sede').innerText = aprovados.filter(a => a.embarque === 'SEDE').length;
            document.getElementById('emb-barro').innerText = aprovados.filter(a => a.embarque === 'BARRO VERMELHO').length;
            document.getElementById('emb-lapa').innerText = aprovados.filter(a => a.embarque === 'LAPA').length;
            document.getElementById('emb-vila').innerText = aprovados.filter(a => a.embarque === 'VILA').length;

            const insts = {};
            aprovados.forEach(a => { insts[a.instituicao] = (insts[a.instituicao] || 0) + 1; });
            const ordenadas = Object.keys(insts).sort((a,b) => insts[b] - insts[a]);
            document.getElementById('lista-instituicoes').innerHTML = ordenadas.map(i => `<div><strong>${i}</strong> <span>${insts[i]}</span></div>`).join('');
        }

        function renderizarTabela() {
            const busca = document.getElementById('busca')?.value.toLowerCase() || "";
            const tbody = document.getElementById('tabela-corpo');
            if(!tbody) return;
            tbody.innerHTML = '';

            dadosNuvem.forEach((aluno, idx) => {
                if(aluno.nome.toLowerCase().includes(busca) || aluno.instituicao.toLowerCase().includes(busca)) {
                    tbody.innerHTML += `<tr>
                        <td>${idx + 1}</td>
                        <td><strong>${aluno.nome}</strong></td>
                        <td>${aluno.instituicao}</td>
                        <td>${aluno.embarque}</td>
                        <td>${aluno.turno}</td>
                    </tr>`;
                }
            });
        }
    </script>
</body>
</html>

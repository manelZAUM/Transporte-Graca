<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta e Dashboard - Graça/CE</title>
    <style>
        /* --- CORES E VARIÁVEIS GERAIS --- */
        :root {
            --verde-principal: #218838;
            --verde-escuro: #145523;
            --verde-claro: #28a745;
            --laranja: #fd7e14;
            --roxo: #6f42c1;
            --azul-claro: #17a2b8;
            --amarelo: #ffc107;
            --fundo: #f8f9fa; 
            --cor-texto: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--cor-texto);
            min-height: 100vh;
        }

        /* --- TELA DE LOGIN --- */
        body.login-ativo {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fundo-login.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body:not(.login-ativo) {
            background-color: var(--fundo);
            background-image: radial-gradient(#d1dbd4 1.5px, transparent 1.5px);
            background-size: 25px 25px;
        }

        #login-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background-color: #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-box img { max-width: 160px; margin-bottom: 15px; }
        .login-box h2 { color: var(--verde-escuro); font-size: 22px; margin: 0 0 10px 0; font-weight: 600; }
        .login-box p { color: #666; font-size: 14px; margin: 0 0 20px 0; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
        .login-box input:focus { border-color: var(--verde-escuro); }
        .login-box button { width: 100%; padding: 12px; background-color: var(--verde-escuro); color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; transition: background-color 0.2s; }
        .login-box button:hover { background-color: #0e3b18; }

        /* --- CABEÇALHO --- */
        .cabecalho-oficial {
            background-color: var(--verde-escuro);
            border-bottom: 5px solid var(--laranja);
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        .pill-logo {
            background-color: #ffffff;
            padding: 12px 60px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .pill-logo img { max-width: 160px; }

        /* --- DASHBOARD --- */
        #sistema-container { display: none; }
        #dashboard-principal { max-width: 1150px; margin: 0 auto; padding: 30px 20px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .dash-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); border: 1px solid #eaeaea; position: relative; }
        .card-clicavel { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .card-clicavel:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: var(--verde-claro); }

        .dash-card h3 { font-size: 14px; margin: 0 0 10px 0; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        .dash-card .numero { font-size: 32px; font-weight: bold; color: var(--verde-escuro); }

        .secao-titulo { color: var(--verde-escuro); margin: 40px 0 20px 0; border-bottom: 2px solid #ddd; padding-bottom: 8px; font-size: 20px; display: flex; align-items: center; gap: 10px; }

        /* --- TABELAS NOS CARDS --- */
        .bus-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
        .bus-table th { padding: 5px; border-bottom: 2px solid #eee; text-align: center; }
        .bus-table td { padding: 5px; border-bottom: 1px solid #eee; text-align: center; }

        /* --- MODAL DE ALUNOS --- */
        #modal-alunos {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h2 { margin: 0; color: var(--verde-escuro); font-size: 20px; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        
        .lista-modal-alunos { list-style: none; padding: 0; margin: 0; }
        .lista-modal-alunos li { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .lista-modal-alunos li:before { content: "👤"; font-size: 12px; }

        /* --- FILTROS E TABELA --- */
        .filtros-container { display: flex; gap: 10px; flex-wrap: wrap; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--verde-principal); }
        .input-filtro { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; flex: 1; min-width: 150px; }
        
        .table-responsive { background: white; border-radius: 8px; overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f4f4f4; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-aprovado { background: #d4edda; color: #155724; }
        .badge-pendente { background: #fff3cd; color: #856404; }
    </style>
</head>
<body class="login-ativo">

    <div id="login-wrapper">
        <div class="login-box">
            <img src="Captura de tela 2026-02-23 080257.png" alt="Governo Municipal de Graça">
            <h2>Acesso Restrito</h2>
            <p>Introduza o seu CPF para visualizar o painel.</p>
            <input type="text" id="cpf-input" placeholder="Apenas números (Ex: 12345678900)">
            <button onclick="tentarAcesso()">Entrar no Painel</button>
            <div id="feedback-login" style="margin-top:10px; font-size: 14px; font-weight: bold;"></div>
        </div>
    </div>

    <div id="sistema-container">
        <header class="cabecalho-oficial">
            <div class="pill-logo"><img src="Captura de tela 2026-02-23 080257.png" alt="Governo Municipal de Graça"></div>
        </header>

        <div id="dashboard-principal">
            <div class="dashboard-grid">
                <div class="dash-card">
                    <h3>Total Geral</h3>
                    <div class="numero" id="total-alunos">0</div>
                </div>
                <div class="dash-card">
                    <h3>Novatos</h3>
                    <div class="numero" id="total-novatos" style="color:var(--verde-claro)">0</div>
                </div>
                <div class="dash-card">
                    <h3>Residentes Sobral</h3>
                    <div class="numero" id="total-residentes" style="color:var(--azul-claro)">0</div>
                </div>
            </div>

            <h3 class="secao-titulo">🏫 Ocupação por Instituição (Aprovados)</h3>
            <p style="font-size: 12px; color: #888; margin-top: -15px; margin-bottom: 20px;">💡 Clique no card para ver a lista de nomes.</p>
            <div class="dashboard-grid" id="cards-instituicoes"></div>

            <h3 class="secao-titulo">🔍 Consulta de Dados</h3>
            <div class="filtros-container">
                <input type="text" id="buscaGeral" class="input-filtro" placeholder="Buscar por nome..." onkeyup="renderizarTabela()">
                <select id="filtroInstituicao" class="input-filtro" onchange="renderizarTabela()">
                    <option value="">Todas Instituições</option>
                </select>
                <select id="filtroOnibus" class="input-filtro" onchange="renderizarTabela()">
                    <option value="">Todos Ônibus</option>
                    <option value="AMARELO">🟡 Amarelo</option>
                    <option value="AZUL">🔵 Azul</option>
                </select>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Nome</th><th>Instituição</th><th>Embarque</th><th>Ônibus</th><th>Turno</th><th>Status</th></tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-alunos" onclick="fecharModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="fecharModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-titulo-inst">Instituição</h2>
                <small id="modal-subtitulo" style="color:#666"></small>
            </div>
            <ul id="lista-alunos-modal" class="lista-modal-alunos"></ul>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyAnZE7XRAGVogS81Z52nNi4Y3PvEUwiY0cGATxWP2n0LYEQ52K4iRAMxCHIqdCTNs/exec"; 
        let dadosNuvem = [];

        // Adiciona evento de enter no input do CPF
        document.getElementById("cpf-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                tentarAcesso();
            }
        });

        async function tentarAcesso() {
            const cpf = document.getElementById('cpf-input').value.trim();
            const feedback = document.getElementById('feedback-login');

            if (!cpf) {
                feedback.innerText = "Por favor, introduza o seu CPF.";
                feedback.style.color = "red";
                return;
            }

            feedback.innerText = "A validar acesso com o servidor...";
            feedback.style.color = "var(--verde-escuro)";

            try {
                const response = await fetch(`${API_URL}?cpf=${cpf.replace(/\D/g, '')}`);
                const data = await response.json();

                if (!data.erro) {
                    dadosNuvem = data.map(aluno => {
                        let obj = {};
                        for(let k in aluno) {
                            let key = k.normalize('NFD').replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
                            obj[key] = String(aluno[k] || "");
                        }
                        return obj;
                    });
                    
                    document.getElementById('login-wrapper').style.display = 'none';
                    document.getElementById('sistema-container').style.display = 'block';
                    document.body.classList.remove('login-ativo');
                    
                    gerarDashboard();
                    popularFiltros();
                    renderizarTabela();
                } else {
                    feedback.innerText = data.erro;
                    feedback.style.color = "red";
                }
            } catch (e) { 
                console.error(e);
                feedback.innerText = "Erro de ligação com o servidor.";
                feedback.style.color = "red";
            }
        }

        function getOnibus(aluno) {
            const inst = (aluno.instituicao || "").toUpperCase();
            if (aluno.onibus && aluno.onibus.toUpperCase().includes('AMARELO')) return 'AMARELO';
            if (aluno.onibus && aluno.onibus.toUpperCase().includes('AZUL')) return 'AZUL';
            const vaiAmarelo = ["UNINTA", "FLF", "LUCIANO FEIJÃO", "ANHANGUERA", "GRAU", "UVA-CCS"].some(i => inst.includes(i));
            return vaiAmarelo ? 'AMARELO' : 'AZUL';
        }

        function gerarDashboard() {
            const aprovados = dadosNuvem.filter(a => a.status === 'Aprovado');
            
            document.getElementById('total-alunos').innerText = dadosNuvem.length;
            document.getElementById('total-novatos').innerText = dadosNuvem.filter(a => a.novato === 'Sim').length;
            document.getElementById('total-residentes').innerText = dadosNuvem.filter(a => a.sobral === 'Sim').length;

            const contagem = {};
            aprovados.forEach(a => {
                const inst = a.instituicao.trim();
                if (!inst) return;
                if (!contagem[inst]) contagem[inst] = { manha: 0, noite: 0, total: 0 };
                
                const turno = (a.turno || "").toUpperCase();
                if (turno.includes("MANHÃ")) contagem[inst].manha++;
                if (turno.includes("NOITE")) contagem[inst].noite++;
                contagem[inst].total++;
            });

            const grid = document.getElementById('cards-instituicoes');
            grid.innerHTML = '';
            
            Object.keys(contagem).sort().forEach(inst => {
                const d = contagem[inst];
                grid.innerHTML += `
                    <div class="dash-card card-clicavel" onclick="abrirModalAlunos('${inst}')">
                        <h3>🎓 ${inst}</h3>
                        <div class="numero">${d.total}</div>
                        <table class="bus-table">
                            <thead><tr><th>Manhã</th><th>Noite</th></tr></thead>
                            <tbody><tr><td>${d.manha}</td><td>${d.noite}</td></tr></tbody>
                        </table>
                    </div>`;
            });
        }

        function abrirModalAlunos(inst) {
            const modal = document.getElementById('modal-alunos');
            const lista = document.getElementById('lista-alunos-modal');
            const titulo = document.getElementById('modal-titulo-inst');
            const sub = document.getElementById('modal-subtitulo');
            
            const alunos = dadosNuvem.filter(a => a.instituicao.trim() === inst && a.status === 'Aprovado')
                                     .sort((a, b) => a.nome.localeCompare(b.nome));

            titulo.innerText = inst;
            sub.innerText = `${alunos.length} alunos aprovados`;
            lista.innerHTML = alunos.map(a => `<li>${a.nome.toUpperCase()}</li>`).join('');
            
            modal.style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal-alunos').style.display = 'none'; }

        function popularFiltros() {
            const sel = document.getElementById('filtroInstituicao');
            const insts = [...new Set(dadosNuvem.map(a => a.instituicao.trim()))].filter(i => i).sort();
            insts.forEach(i => sel.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function renderizarTabela() {
            const busca = document.getElementById('buscaGeral').value.toLowerCase();
            const instF = document.getElementById('filtroInstituicao').value;
            const busF = document.getElementById('filtroOnibus').value;
            const tbody = document.getElementById('lista');
            tbody.innerHTML = '';

            dadosNuvem.filter(a => {
                const bN = a.nome.toLowerCase().includes(busca);
                const bI = !instF || a.instituicao === instF;
                const bO = !busF || getOnibus(a) === busF;
                return bN && bI && bO;
            }).sort((a,b) => a.nome.localeCompare(b.nome)).forEach(a => {
                const st = a.status === 'Aprovado' ? 'badge-aprovado' : 'badge-pendente';
                const onibus = getOnibus(a) === 'AMARELO' ? '🟡 Amarelo' : '🔵 Azul';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${a.nome}</strong></td>
                        <td>${a.instituicao}</td>
                        <td>${a.embarque}</td>
                        <td>${onibus}</td>
                        <td>${a.turno}</td>
                        <td><span class="badge ${st}">${a.status}</span></td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>

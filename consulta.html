<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Transporte - Graça/CE</title>
    <link rel="stylesheet" href="css">
</head>
<body class="login-ativo">

    <div id="login-wrapper">
        <div class="login-box">
            <img src="Captura de tela 2026-02-23 080257.png" alt="Governo Municipal de Graça">
            <h2>Acesso Restrito</h2>
            <p>Introduza o seu CPF para visualizar os seus dados.</p>
            <input type="text" id="cpf-input" placeholder="Apenas números">
            <button onclick="tentarAcesso()" id="btn-entrar">
                <div id="spinner" class="spinner"></div>
                <span>Entrar no Painel</span>
            </button>
            <div id="feedback-login" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="sistema-container" style="display:none;">
        <header class="cabecalho-oficial">
            <div class="pill-logo"><img src="Captura de tela 2026-02-23 080257.png" alt="Logo"></div>
        </header>
        <div id="dashboard-principal">
            </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyWhX3Cb2CzqzjTWDcZDqwiZrO8OYAWt0s3pMTEA1UOeBZcVsbQv5B0jnmwQHnb_Q4/exec";
        let dadosAluno = null;

        async function tentarAcesso() {
            const cpf = document.getElementById('cpf-input').value.trim().replace(/\D/g, '');
            const feedback = document.getElementById('feedback-login');
            const btn = document.getElementById('btn-entrar');
            const spinner = document.getElementById('spinner');

            if (cpf.length !== 11) {
                feedback.innerText = "❌ Digite um CPF válido.";
                feedback.style.color = "red";
                return;
            }

            // Ativa UI de carregamento
            btn.disabled = true;
            spinner.style.display = "block";
            feedback.innerText = "A validar acesso...";
            feedback.style.color = "var(--verde-escuro)";

            try {
                const response = await fetch(`${API_URL}?cpf=${cpf}`);
                const data = await response.json();

                if (!data.erro) {
                    // O servidor agora devolve apenas UM aluno
                    dadosAluno = data[0]; 
                    
                    document.getElementById('login-wrapper').style.display = 'none';
                    document.getElementById('sistema-container').style.display = 'block';
                    document.body.classList.remove('login-ativo');
                    
                    renderizarDadosUnicos();
                } else {
                    feedback.innerText = "❌ " + data.erro;
                    feedback.style.color = "red";
                }
            } catch (e) {
                feedback.innerText = "❌ Erro ao ligar ao servidor.";
                feedback.style.color = "red";
            } finally {
                btn.disabled = false;
                spinner.style.display = "none";
            }
        }

        function renderizarDadosUnicos() {
            // Aqui você preenche o dashboard apenas com as informações do 'dadosAluno'
            // Isso garante que um aluno não veja os dados dos outros
            console.log("Bem-vindo, " + dadosAluno.nome);
            // Exemplo: document.getElementById('total-alunos').innerText = "1";
        }
    </script>
    <script src="Js\app.js"></script>
</body>
</html>
